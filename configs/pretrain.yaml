data:
  batch_size: 64
  max_molecules: 50000

model:
  d_model: 64
  gin_hidden: 128
  gin_layers: 4
  mamba_state: 32
  mamba_conv: 4
  mamba_expand: 2
  mamba_layers: 2
  bidirectional: true
  rwse_walk_length: 16
  dropout: 0.2

training:
  epochs: 200
  lr: 0.0005
  weight_decay: 0.001
  esf_weight: 0.2
  mask_ratio: 0.15
  patience: 15
